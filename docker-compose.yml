services:
  db:
    image: postgres:16-alpine
    container_name: dispatch-db
    environment:
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: dispatch
      POSTGRES_DB: dispatch
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d dispatch"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: dispatch-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: dispatch-api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://dispatch:dispatch@db:5432/dispatch
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: 3d1448389ecca877d3fd2dfc4cdad99b764196c675e59b6ef50f9c4a3220cdb0
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      MAIL_HOST: localhost
      MAIL_PORT: "25"
      MAIL_USER: ""
      MAIL_PASS: ""
      MAIL_FROM: noreply@example.com
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: dispatch-worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://dispatch:dispatch@db:5432/dispatch
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: 3d1448389ecca877d3fd2dfc4cdad99b764196c675e59b6ef50f9c4a3220cdb0
      JWT_ALG: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      MAIL_HOST: localhost
      MAIL_PORT: "25"
      MAIL_USER: ""
      MAIL_PASS: ""
      MAIL_FROM: noreply@example.com
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    command: celery -A celery_app.celery worker -l info

volumes:
  pg_data:
